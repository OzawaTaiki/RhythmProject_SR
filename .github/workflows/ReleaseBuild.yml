name: ReleaseBuild

on:
  push:
    branches:
      - master

env:
  SOLUTION_FILE_PATH: Application/RhythmProject.sln
  CONFIGURATION: Release

jobs:
  build:
    runs-on: windows-2022
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 1
      
      - name: AddMsBuild to PATH
        uses: microsoft/setup-msbuild@v2
        with:
          msbuild-architecture: x64
      
      - name: Build
        run: |
          msbuild ${{env.SOLUTION_FILE_PATH}} `
          /p:Platform=x64,Configuration=${{env.CONFIGURATION}} `
          /m:16 `
          /p:CL_MPCount=16 `
          /p:UseMultiToolTask=true `
          /p:EnforceProcessCountAcrossBuilds=true `
          /p:PreferredToolArchitecture=x64 `
          /nodeReuse:true `
          /clp:ErrorsOnly `
          /v:minimal `
          /p:LinkIncremental=false
